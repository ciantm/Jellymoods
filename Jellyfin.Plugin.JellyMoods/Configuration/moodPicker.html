<!DOCTYPE html>
<html>
<head><meta charset="utf-8"/><title>JellyMoods</title></head>
<body>
<div data-role="page" class="page" id="jellyMoodsPage">
<div data-role="content">
<div style="display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;font-family:sans-serif;color:#fff;">

  <h2 style="font-size:1.6em;font-weight:300;letter-spacing:0.06em;margin:0 0 6px;">🎵 JellyMoods</h2>
  <p style="font-size:0.85em;color:#888;margin:0 0 32px;">Tap the wheel to match music to your mood</p>

  <div id="jmWheelWrap" style="position:relative;width:min(80vw,420px);height:min(80vw,420px);margin:0 auto 8px;">

    <div style="
      width:100%;height:100%;border-radius:50%;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.30) 0%, transparent 35%),
        conic-gradient(from 135deg,
          #3c5fc8 0deg, #5a3fa0 45deg, #c83c3c 90deg,
          #d4960a 135deg, #2ec8a0 180deg, #2080c8 225deg,
          #3c5fc8 270deg, #5a3fa0 315deg, #c83c3c 360deg);
      box-shadow:0 0 60px rgba(0,0,0,0.7),0 0 0 2px rgba(255,255,255,0.10);
    "></div>

    <!-- Axis labels -->
    <span style="position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:0.65em;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);pointer-events:none;">Active</span>
    <span style="position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-size:0.65em;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);pointer-events:none;">Passive</span>
    <span style="position:absolute;left:-62px;top:50%;transform:translateY(-50%);font-size:0.65em;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);pointer-events:none;">Negative</span>
    <span style="position:absolute;right:-62px;top:50%;transform:translateY(-50%);font-size:0.65em;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.45);pointer-events:none;">Positive</span>

    <!-- Corner labels -->
    <span style="position:absolute;top:14px;left:18px;font-size:0.65em;font-weight:700;color:#ff7070;line-height:1.3;pointer-events:none;">Angry<br>Tense</span>
    <span style="position:absolute;top:14px;right:18px;font-size:0.65em;font-weight:700;color:#ffe066;line-height:1.3;text-align:right;pointer-events:none;">Happy<br>Excited</span>
    <span style="position:absolute;bottom:14px;left:18px;font-size:0.65em;font-weight:700;color:#7ba3ff;line-height:1.3;pointer-events:none;">Sad<br>Lonely</span>
    <span style="position:absolute;bottom:14px;right:18px;font-size:0.65em;font-weight:700;color:#5ee8cc;line-height:1.3;text-align:right;pointer-events:none;">Calm<br>Serene</span>

    <!-- Dot -->
    <div id="moodDot" style="position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 0 0 3px rgba(0,0,0,0.5),0 0 14px rgba(255,255,255,0.8);transform:translate(-50%,-50%);pointer-events:none;display:none;transition:background 0.25s;"></div>

    <!-- Tap overlay -->
    <div id="jmOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;cursor:crosshair;-webkit-tap-highlight-color:transparent;"></div>
  </div>

  <div style="text-align:center;margin-top:36px;min-height:80px;">
    <div id="jmMoodName" style="font-size:1.4em;font-weight:300;letter-spacing:0.08em;color:#fff;min-height:1.6em;">— How are you feeling? —</div>
    <div id="jmMoodDesc" style="font-size:0.82em;color:#999;margin-top:6px;min-height:1.2em;"></div>
  </div>

  <div style="margin-top:20px;text-align:center;">
    <button id="jmPlayBtn" style="display:none;padding:14px 44px;border:none;border-radius:30px;font-size:1em;font-weight:700;letter-spacing:0.06em;cursor:pointer;background:linear-gradient(135deg,#7c6fff,#4eb8d8);color:#fff;box-shadow:0 4px 20px rgba(78,184,216,0.4);-webkit-tap-highlight-color:transparent;">▶ Play This Mood</button>
    <div id="jmStatus" style="margin-top:12px;font-size:0.8em;color:#777;min-height:1.2em;"></div>
    <div id="jmTrackCount" style="display:none;margin-top:6px;font-size:0.78em;color:#aaa;"></div>
  </div>

</div>
</div>
</div>

<script>
(function(){
'use strict';

// ── Last.fm mood tags mapped to (x, y) in 0–1 space ───────────────────────
// x = valence:  0 = most negative  →  1 = most positive

  // ── High arousal, negative valence (top-left) ──────────────────────────

  { name:'Euphoric',     desc:'Blissful, elated, overjoyed',            x:0.95, y:0.95, col:'#ffee22', genres:['EDM','Trance','Happy Hardcore','Rave'] },

  { name:'Upbeat',       desc:'Lively, positive, feel-good',            x:0.78, y:0.80, col:'#ffd535', genres:['Pop','Ska','Funk','Indie Pop'] },

  { name:'Happy',        desc:'Cheerful, warm, contented joy',          x:0.82, y:0.72, col:'#ffe050', genres:['Pop','Indie Pop','Soul','Funk','Reggae'] },
  { name:'Groovy',       desc:'Funky, rhythmic, in-the-pocket',         x:0.75, y:0.70, col:'#f0c840', genres:['Funk','Soul','R&B','Disco','Groove Metal'] },
  { name:'Powerful',     desc:'Strong, commanding, forceful',           x:0.60, y:0.88, col:'#e8b030', genres:['Rock','Metal','Orchestral','Gospel','Hip-Hop'] },

  { name:'Mysterious',   desc:'Intriguing, shadowy, unknown depths',    x:0.38, y:0.52, col:'#8070c8', genres:['Dark Ambient','Post-Rock','Gothic','Cinematic'] },
  { name:'Hypnotic',     desc:'Trance-like, mesmerising, repetitive',   x:0.48, y:0.48, col:'#7088d0', genres:['Ambient','Drone','Krautrock','Minimal Techno'] },
  { name:'Atmospheric',  desc:'Spacious, immersive, enveloping',        x:0.55, y:0.38, col:'#5090c8', genres:['Ambient','Post-Rock','Shoegaze','Space Rock'] },
  { name:'Bittersweet',  desc:'Joy and sadness mixed, poignant',        x:0.45, y:0.30, col:'#7080b8', genres:['Indie','Singer-Songwriter','Folk','Sadcore'] },
  { name:'Nostalgic',    desc:'Wistful longing for the past',           x:0.42, y:0.28, col:'#6878b8', genres:['Classic Rock','Oldies','Folk','Indie','Dream Pop'] },

  { name:'Yearning',     desc:'Deep longing, desire unfulfilled',       x:0.38, y:0.42, col:'#6070b0', genres:['Folk','Indie','Shoegaze','Dream Pop','Emo'] },
  { name:'Epic',         desc:'Grand, sweeping, larger than life',      x:0.62, y:0.80, col:'#d0a020', genres:['Orchestral','Soundtrack','Post-Rock','Power Metal','Prog'] },
  { name:'Majestic',     desc:'Stately, grand, awe-inspiring',          x:0.65, y:0.72, col:'#c8a828', genres:['Classical','Orchestral','Celtic','Soundtrack'] },

  // ── Low arousal, positive valence (bottom-right) ─────────────────────
  { name:'Romantic',     desc:'Loving, tender, intimate warmth',        x:0.72, y:0.35, col:'#60d8a0', genres:['Jazz','Soul','R&B','Bossa Nova','Soft Rock'] },
  { name:'Tender',       desc:'Gentle, soft, affectionate',             x:0.70, y:0.28, col:'#55dca8', genres:['Acoustic','Singer-Songwriter','Folk','Ambient'] },
  { name:'Content',      desc:'Satisfied, at ease, quietly pleased',    x:0.70, y:0.25, col:'#50dcc0', genres:['Acoustic','Folk','Jazz','Chill','Indie'] },
  { name:'Dreamy',       desc:'Floating, hazy, softly surreal',         x:0.62, y:0.22, col:'#60c8d8', genres:['Dream Pop','Shoegaze','Ambient','Chillwave'] },
  { name:'Intimate',     desc:'Close, personal, quietly heartfelt',     x:0.68, y:0.28, col:'#58d4b0', genres:['Jazz','Acoustic','Singer-Songwriter','Neo-Soul'] },
  { name:'Peaceful',     desc:'Tranquil, undisturbed, quiet',           x:0.88, y:0.10, col:'#35e8c0', genres:['Ambient','Classical','New Age','Acoustic','Nature'] },

  { name:'Relaxed',      desc:'Loose, at rest, free from tension',      x:0.78, y:0.18, col:'#40d8c0', genres:['Chill','Jazz','Reggae','Bossa Nova','Acoustic'] },
  { name:'Soothing',     desc:'Comforting, easing, gentle relief',      x:0.82, y:0.15, col:'#38dcc0', genres:['Ambient','New Age','Classical','Piano','Nature'] },

  // ── Low arousal, negative valence (bottom-left) ───────────────────────
  { name:'Melancholic',  desc:'Quietly sorrowful, reflective sadness',  x:0.25, y:0.22, col:'#6090ff', genres:['Blues','Indie','Singer-Songwriter','Folk','Slowcore'] },
  { name:'Sad',          desc:'Unhappy, sorrowful, downcast',           x:0.18, y:0.18, col:'#5080ff', genres:['Blues','Soul','Folk','Indie','Sad Rock'] },
  { name:'Lonely',       desc:'Isolated, alone, missing connection',    x:0.18, y:0.15, col:'#4878ff', genres:['Folk','Indie','Singer-Songwriter','Slowcore','Ambient'] },
  { name:'Somber',       desc:'Dark and serious, grave mood',           x:0.20, y:0.20, col:'#5070e8', genres:['Classical','Dark Ambient','Blues','Gothic'] },
  { name:'Mournful',     desc:'Grieving, lamenting, sorrowful',         x:0.12, y:0.18, col:'#4068f0', genres:['Blues','Gospel','Folk','Funeral Doom','Requiem'] },
  { name:'Gloomy',       desc:'Overcast, cheerless, despairing',        x:0.15, y:0.20, col:'#4870e8', genres:['Post-Punk','Gothic','Dark Wave','Slowcore','Doom'] },
  { name:'Depressed',    desc:'Heavy, hopeless, withdrawn',             x:0.08, y:0.08, col:'#3060e0', genres:['Slowcore','Sad Core','Dark Folk','Doom Metal','Ambient'] },
  { name:'Wistful',      desc:'Wishing things were different, pensive', x:0.38, y:0.22, col:'#6878c8', genres:['Folk','Indie','Dream Pop','Singer-Songwriter'] },
  { name:'Dark',         desc:'Shadowy, brooding, heavy atmosphere',    x:0.18, y:0.42, col:'#5055c0', genres:['Dark Ambient','Gothic','Post-Punk','Doom','Black Metal'] },
];

var selectedValence=0, selectedArousal=0, pendingItems=[], currentMood=null;

// ── Find closest mood and blend genres from nearby moods ──────────────────
function getMoodAtPoint(nx, ny) {
  // nx, ny are 0..1 (x=valence, y=1-arousal because Y=0 is top on screen)
  var best=MOODS[0], bestDist=Infinity;
  for(var i=0;i<MOODS.length;i++){
    var m=MOODS[i];
    var dx=nx-m.x, dy=ny-m.y;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<bestDist){bestDist=d;best=m;}
  }
  return {mood:best, dist:bestDist};
}

function getBlendedGenres(nx, ny) {
  // Weight each mood by inverse distance squared, include those within radius 0.35
  var RADIUS=0.35;
  var weighted=[];
  for(var i=0;i<MOODS.length;i++){
    var m=MOODS[i];
    var dx=nx-m.x, dy=ny-m.y;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<RADIUS) weighted.push({genres:m.genres, w:1/(d*d+0.01)});
  }
  // Sort by weight desc, take top 3 moods' genres
  weighted.sort(function(a,b){return b.w-a.w;});
  var out={};
  var take=Math.min(3,weighted.length);
  for(var j=0;j<take;j++){
    weighted[j].genres.forEach(function(g){out[g]=true;});
  }
  return Object.keys(out);
}

function handleInteraction(clientX, clientY){
  var wrap=document.getElementById('jmWheelWrap');
  var rect=wrap.getBoundingClientRect();
  var cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  var r=rect.width/2;
  var dx=clientX-cx, dy=clientY-cy;
  if(Math.sqrt(dx*dx+dy*dy)>r) return;

  // Convert to 0..1 normalised coords (x=valence, y=arousal inverted)
  var nx=(dx/r)*0.5+0.5;       // 0=left(negative), 1=right(positive)
  var ny=1-((-dy/r)*0.5+0.5);  // 0=bottom(passive), 1=top(active), then flip for screen coords
  // Actually: dy is negative when up, so arousal = -dy/r mapped to 0..1
  var arousal=(-dy/r)*0.5+0.5; // 0=bottom passive, 1=top active
  var valence=(dx/r)*0.5+0.5;  // 0=left negative, 1=right positive

  selectedValence=valence; selectedArousal=arousal;

  var res=getMoodAtPoint(valence, arousal);
  currentMood=res.mood;

  // Move dot
  var dot=document.getElementById('moodDot');
  dot.style.left=(clientX-rect.left)+'px';
  dot.style.top=(clientY-rect.top)+'px';
  dot.style.background=res.mood.col;
  dot.style.display='block';

  setMoodName(res.mood.name, res.mood.col);
  setMoodDesc(res.mood.desc);
  showPlayBtn(true);
  setStatus('Searching your library…');
  setTrackCount(0);
  pendingItems=[];

  var genres=getBlendedGenres(valence, arousal);
  fetchTracksByGenres(genres)
    .then(function(items){ return items.length>0?items:fetchFallback(); })
    .then(function(items){
      pendingItems=items;
      setTrackCount(items.length);
      setStatus(items.length>0?'':'No tracks found — check genre tags in your library or update settings.');
    })
    .catch(function(e){ console.error('[JellyMoods]',e); setStatus('Could not fetch tracks.'); });
}

// ── Event binding ─────────────────────────────────────────────────────────
var overlay=document.getElementById('jmOverlay');

overlay.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t=e.touches[0];
  handleInteraction(t.clientX,t.clientY);
},{passive:false});

overlay.onclick=function(e){
  handleInteraction(e.clientX,e.clientY);
};

// ── UI helpers ────────────────────────────────────────────────────────────
function setStatus(t){document.getElementById('jmStatus').textContent=t;}
function setMoodName(t,col){var el=document.getElementById('jmMoodName');el.textContent=t;el.style.color=col||'#fff';}
function setMoodDesc(t){document.getElementById('jmMoodDesc').textContent=t;}
function showPlayBtn(v){document.getElementById('jmPlayBtn').style.display=v?'inline-block':'none';}
function setTrackCount(n){var el=document.getElementById('jmTrackCount');el.style.display=n>0?'block':'none';el.textContent=n>0?n+' tracks found':'';}

// ── API ───────────────────────────────────────────────────────────────────
function fetchTracksByGenres(genres){
  var api=window.ApiClient;
  if(!api) return Promise.resolve([]);
  return api.getCurrentUser().then(function(user){
    var p={IncludeItemTypes:'Audio',Recursive:true,SortBy:'Random',Limit:50,Fields:'Genres,MediaSources'};
    if(genres.length>0) p.Genres=genres.join(',');
    return api.getItems(user.Id,p).then(function(r){return r.Items||[];});
  });
}
function fetchFallback(){
  var api=window.ApiClient;
  if(!api) return Promise.resolve([]);
  return api.getCurrentUser().then(function(user){
    return api.getItems(user.Id,{IncludeItemTypes:'Audio',Recursive:true,SortBy:'Random',Limit:30})
      .then(function(r){return r.Items||[];});
  });
}

// ── Play ──────────────────────────────────────────────────────────────────
document.getElementById('jmPlayBtn').onclick=function(){
  var play=function(items){
    if(!items||!items.length){setStatus('No matching tracks found.');return;}
    setStatus('Starting playback…');
    require(['playbackManager'],function(pm){
      pm.play({items:items,startIndex:0,queryOptions:{}});
      setStatus('Playing '+items.length+' tracks ♪');
    });
  };
  if(pendingItems.length>0){play(pendingItems);return;}
  setStatus('Fetching tracks…');
  fetchTracksByGenres(getBlendedGenres(selectedValence,selectedArousal))
    .then(function(items){return items.length>0?items:fetchFallback();})
    .then(play)
    .catch(function(){setStatus('Could not fetch tracks.');});
};

})();
</script>
