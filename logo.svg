<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Pinyon+Script&amp;display=swap');</style>
    <radialGradient id="gR" cx="0%" cy="0%" r="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ff1a00" stop-opacity="0.65"/>
      <stop offset="65%" stop-color="#ff1a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gY" cx="100%" cy="0%" r="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffe800" stop-opacity="0.55"/>
      <stop offset="65%" stop-color="#ffe800" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gT" cx="100%" cy="100%" r="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00e8c0" stop-opacity="0.55"/>
      <stop offset="65%" stop-color="#00e8c0" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="c"><circle cx="200" cy="200" r="196"/></clipPath>
    <filter id="sg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feFlood flood-color="#000" flood-opacity="0.9"/><feComposite in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="200" cy="200" r="196" fill="#000"/>
  <g clip-path="url(#c)">
    <rect width="400" height="400" fill="url(#gR)"/>
    <rect width="400" height="400" fill="url(#gY)" style="mix-blend-mode:screen"/>
    <rect width="400" height="400" fill="url(#gT)" style="mix-blend-mode:screen"/>
  </g>
  <circle cx="200" cy="200" r="196" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <text x="200" y="262"
        font-family="'Pinyon Script', Georgia, serif"
        font-size="147"
        fill="white" fill-opacity="0.75"
        text-anchor="middle" filter="url(#sg)">M</text>
  <text x="204" y="318"
        font-family="sans-serif" font-size="22" font-weight="300" letter-spacing="16"
        fill="white" fill-opacity="0.48"
        text-anchor="middle">musian</text>
</svg>
