name: Android Build & Upload

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Capacitor sync
        working-directory: android-app
        run: |
          npm install
          npx cap sync android

      - name: Build debug APK
        working-directory: android-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Upload APK to Google Drive
        run: |
          TAG="${GITHUB_REF_NAME}"
          rclone copy \
            android-app/android/app/build/outputs/apk/debug/app-debug.apk \
            "gdrive:Businesses & Projects/Musian/" \
            --drive-use-trash=false \
            --no-update-modtime
          rclone moveto \
            "gdrive:Businesses & Projects/Musian/app-debug.apk" \
            "gdrive:Businesses & Projects/Musian/Musian-${TAG}.apk"
