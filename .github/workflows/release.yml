name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'build.yaml'
  push:
    tags:
      - 'v*.*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Setup .NET ────────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Parse version ─────────────────────────────────────────────────────
      - name: Parse version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#v}"
          else
            VER=$(grep '^version:' build.yaml | sed 's/version: *"\(.*\)"/\1/')
            TAG="v${VER}"
          fi
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      # ── Create tag if triggered by branch push ────────────────────────────
      - name: Create and push tag
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }} || echo "Tag already exists"
          git push origin ${{ steps.version.outputs.tag }} || echo "Tag already pushed"

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: |
          dotnet build \
            Jellyfin.Plugin.JellyMoods/Jellyfin.Plugin.JellyMoods.csproj \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.version }} \
            --output ./build_output

      # ── Package zip ──────────────────────────────────────────────────────
      - name: Package
        run: |
          ARTIFACT="Jellyfin.Plugin.JellyMoods_${{ steps.version.outputs.version }}.zip"
          cd build_output
          zip "../${ARTIFACT}" Jellyfin.Plugin.JellyMoods.dll
          cd ..
          echo "artifact=${ARTIFACT}" >> "$GITHUB_ENV"
          echo "checksum=$(md5sum "${ARTIFACT}" | awk '{print $1}')" >> "$GITHUB_ENV"

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: ${{ env.artifact }}

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: JellyMoods ${{ steps.version.outputs.version }}
          body: |
            ## JellyMoods ${{ steps.version.outputs.version }}

            ### Install via Jellyfin
            Add this manifest URL to Jellyfin → Dashboard → Plugins → Repositories:
            ```
            https://ciantm.github.io/Jellymoods/manifest.json
            ```
            Then search for **JellyMoods** in the plugin catalogue.

            ### Manual install
            Download `${{ env.artifact }}`, extract the DLL into your Jellyfin plugins folder and restart.

            **MD5:** `${{ env.checksum }}`
          files: ${{ env.artifact }}
          fail_on_unmatched_files: true

  # ── Update manifest.json on gh-pages ────────────────────────────────────
  update-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip

      - name: Parse version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#v}"
          else
            VER=$(grep '^version:' build.yaml | sed 's/version: *"\(.*\)"/\1/' 2>/dev/null || echo "${{ needs.build.outputs.version }}")
            TAG="v${VER}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"

      - name: Compute checksum & timestamp
        id: meta
        run: |
          ARTIFACT="Jellyfin.Plugin.JellyMoods_${{ steps.version.outputs.version }}.zip"
          echo "checksum=$(md5sum "${ARTIFACT}" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"           >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          python3 update_manifest.py \
            --version   "${{ steps.version.outputs.version }}" \
            --tag       "${{ steps.version.outputs.tag }}" \
            --checksum  "${{ steps.meta.outputs.checksum }}" \
            --timestamp "${{ steps.meta.outputs.timestamp }}"

      - name: Commit & push manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest for ${{ steps.version.outputs.tag }}" || echo "No changes"
          git push
